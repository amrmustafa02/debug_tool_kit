name: debug_toolkit
description: In-app debug panel for Flutter — network inspector, log viewer, system info. Debug mode only.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ">=4.0.0 <6.0.0"
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0
  vm_service: ">=14.0.0 <16.0.0"
  video_player: ^2.8.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
